version: "3.9"

services:
  backend:
    build: ./backend
    container_name: history_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - chroma_data:/chroma_data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PUBLIC_DATA_API_KEY=${PUBLIC_DATA_API_KEY}
      - GONGU_API_KEY=${GONGU_API_KEY}
      - HGIS_API_KEY=${HGIS_API_KEY}
      - NL_API_KEY=${NL_API_KEY}
      - CHROMA_PATH=/chroma_data
      - DATA_PATH=/data
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: history_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: history_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: history_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  chroma_data:
